// 1v1.cfg — two-player 1v1 duel ruleset.
// Execed by the server when CS2_MODE=1v1 (see pre.sh). The Duel1v1 SwiftlyS2
// plugin owns warmup/ready, scoring, halftime side-swap, overtime, per-player
// weapon picks and the loadout; this cfg only sets the supporting round flow.

// --- Round flow: no timer, round ends on elimination (1 death in 1v1) ----
// Round time is set high so the round effectively only ends when a player dies
// (1v1 => one death eliminates a team => round ends naturally). The plugin
// counts those deaths for scoring; mp_maxrounds 0 keeps CS from ending the
// match so the plugin owns match end / halftime / overtime.
mp_roundtime 60
mp_roundtime_defuse 60
mp_roundtime_hostage 60
mp_round_restart_delay 3
mp_freezetime 1
mp_maxrounds 0
mp_timelimit 0

// --- Warmup: infinite, plugin starts the match on !ready ----------------
mp_warmuptime 99999
mp_warmuptime_all_players_connected 99999
mp_warmup_pausetimer 1
mp_warmup_online_enabled 1

// --- Buying fully disabled (weapons via plugin commands) ----------------
mp_buytime 0
mp_buy_anywhere 0
mp_startmoney 0
mp_maxmoney 0
mp_afterroundmoney 0
mp_playercashawards 0
mp_teamcashawards 0
mp_free_armor 0                    // plugin grants armor per the !armor toggle

// --- Keep weapons/util on the player; no dropping/objectives ------------
mp_death_drop_gun 0
mp_death_drop_grenade 0
mp_death_drop_defuser 0
mp_drop_knife_enable 0
mp_weapons_allow_map_placed 0
mp_respawn_on_death_ct 0
mp_respawn_on_death_t 0

// --- Two-player sanity ---------------------------------------------------
mp_solid_teammates 1
mp_friendlyfire 0
mp_autoteambalance 0
mp_limitteams 0
mp_team_intro_time 0
mp_halftime 0                      // plugin performs the single halftime swap
mp_match_can_clinch 0
bot_quota 0
sv_infinite_ammo 0

// --- No native vote UI / intermission / match-end auto-changelevel -------
// Map voting is done via plugin chat commands (!votemap), never the native CS2
// UI. These also stop the post-match team-intro / map-vote screen that froze
// rematches. The Duel1v1 plugin re-asserts these on (re)start since the stock
// gamemode cfg resets them on map load / mp_restartgame.
mp_endmatch_votenextmap 0
mp_endmatch_votenextleveltime 0
mp_endmatch_votenextmap_keepcurrent 0
mp_match_end_changelevel 0
mp_match_end_restart 0
mp_match_restart_delay 1

echo "[mode] 1v1.cfg applied (Duel1v1 plugin drives gameplay)"
