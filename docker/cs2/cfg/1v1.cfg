// 1v1.cfg — winner-stays 1v1 arena ruleset.
// Execed by the server when CS2_MODE=1v1 (see pre.sh). The Arena1v1 SwiftlyS2
// plugin drives pairing, spawns, loadouts and the winner-stays queue; this cfg
// only sets the supporting round flow (no buying, short freeze time, etc.).
mp_maxrounds 0
mp_timelimit 0
mp_freezetime 3
mp_roundtime 1.92
mp_roundtime_defuse 1.92
mp_warmuptime 10
mp_buytime 0
mp_buy_anywhere 0
mp_startmoney 0
mp_maxmoney 0
mp_death_drop_gun 0
mp_death_drop_grenade 0
mp_death_drop_defuser 0
mp_respawn_on_death_ct 0
mp_respawn_on_death_t 0
mp_solid_teammates 1
mp_friendlyfire 0
mp_autoteambalance 0
mp_limitteams 0
bot_quota 0
sv_infinite_ammo 0
echo "[mode] 1v1.cfg applied (Arena1v1 plugin drives gameplay)"
