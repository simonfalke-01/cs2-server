// competitive.cfg — standard 5v5 competitive ruleset.
// Execed by the server when CS2_MODE=competitive (see pre.sh).
mp_maxrounds 24
mp_overtime_enable 1
mp_round_restart_delay 7
mp_freezetime 15
mp_roundtime 1.92
mp_roundtime_defuse 1.92
mp_buytime 20
mp_startmoney 800
mp_maxmoney 16000
mp_warmuptime 60
mp_warmup_pausetimer 0
mp_friendlyfire 1
sv_competitive_official_5v5 1
echo "[mode] competitive.cfg applied"
