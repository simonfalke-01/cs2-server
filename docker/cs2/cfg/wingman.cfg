// wingman.cfg — 2v2 Wingman ruleset.
// Execed by the server when CS2_MODE=wingman (see pre.sh).
mp_maxrounds 16
mp_overtime_enable 1
mp_round_restart_delay 5
mp_freezetime 12
mp_roundtime 1.5
mp_roundtime_defuse 1.5
mp_buytime 20
mp_startmoney 800
mp_maxmoney 16000
mp_warmuptime 30
mp_friendlyfire 1
echo "[mode] wingman.cfg applied"
