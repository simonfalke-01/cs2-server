# Control plane: orchestrator API + Discord bot.
#
# The orchestrator needs access to the host Docker socket to launch CS2 game
# containers, and it must share the host's view of the data/plugins paths so the
# bind mounts it creates for game containers resolve correctly. The simplest
# correct setup is to run the orchestrator directly on the host (make
# run-orchestrator) rather than in a container. This compose file is provided
# for convenience and documents the required wiring.

services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/orchestrator.Dockerfile
    image: cs2-server/orchestrator:latest
    container_name: cs2-orchestrator
    env_file:
      - controlplane.env
    ports:
      - "8080:8080"
    volumes:
      # Required: launch sibling game containers via the host engine.
      - /var/run/docker.sock:/var/run/docker.sock
      # State + per-instance game data + compiled plugins.
      # NOTE: these host paths must match CS2C_DATA_ROOT / CS2C_PLUGINS_DIR and
      # be identical on the host, because the orchestrator passes host paths to
      # the Docker API for the game containers' bind mounts.
      - ./data:/data
      - ../plugins-dist:/plugins:ro
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: deploy/bot.Dockerfile
    image: cs2-server/bot:latest
    container_name: cs2-bot
    env_file:
      - controlplane.env
    depends_on:
      - orchestrator
    restart: unless-stopped
