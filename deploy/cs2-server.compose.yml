# Standalone CS2 game-server container for local testing of the modded image.
#
# This is NOT how the orchestrator runs servers (it talks to the Docker API
# directly), but it's the fastest way to validate Phase 1: build the image,
# bring it up, and confirm Metamod + CounterStrikeSharp + SamplePlugin load.
#
# Usage:
#   make image                       # build cs2-server/cs2 image
#   make plugins                     # build SamplePlugin into ./plugins-dist
#   cp deploy/cs2.env.example deploy/cs2.env  && edit secrets
#   docker compose -f deploy/cs2-server.compose.yml --env-file deploy/cs2.env up
#
# First boot downloads ~60GB via SteamCMD into the named volume; be patient.

services:
  cs2:
    image: cs2-server/cs2:latest
    build:
      context: ../docker/cs2
    container_name: cs2-test
    env_file:
      - cs2.env
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27020:27020/udp"
    volumes:
      # Persist the game install so you only download it once.
      - cs2-data:/home/steam/cs2-dedicated
      # Mount compiled plugins read-only; pre.sh syncs them into CSS on boot.
      - ../plugins-dist:/plugins:ro
    # CS2 needs a fair amount of RAM/CPU; tune for your host.
    stop_grace_period: 30s

volumes:
  cs2-data:
